<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Events — Petrofac HSE</title>
</head>
<body>
     <header>
        <h1>Petrofac HSE Training Tracker</h1>
        <p>Admin Portal</p>
        <hr>
    </header>   
    <nav>
        <a href="../index.html">Dashboard</a>
        <a href="events.html">Training Events</a>
        <a href="registration.html">Registration</a>
        <hr>
    </nav>
    <main>
        <h2>Training Events</h2>
        <form>

            <h3>Add New Training Event</h3>

            <label>Event Title</label>
            <input type="text" id="evTitle" placeholder="e.g. Offshore Safety Induction">
            <br><br>
            <label>HSE Category</label>
            <select id="evCategory">
                <option value="">-- Select Category --</option>
                <option value="Fire Safety">Fire Safety</option>
                <option value="Offshore Survival">Offshore Survival</option>
                <option value="First Aid">First Aid</option>
                <option value="Chemical Handling">Chemical Handling</option>
                <option value="Emergency Response">Emergency Response</option>
                <option value="Manual Handling">Manual Handling</option>
                <option value="Working at Heights">Working at Heights</option>
            </select>
            <br><br>
            <label>Event Date</label>
            <input type="date" id="evDate">
            <br><br>
            <label>Location</label>
            <input type="text" id="evLocation" placeholder="e.g. Aberdeen Training Centre">
            <br><br>
            <label>Max Capacity</label>
            <input type="number" id="evCapacity" placeholder="e.g. 20">
            <br><br>
            <label>Description</label>
            <textarea id="evDescription" placeholder="Description of this Training"></textarea>
            <br><br>

            <button type="button" onclick="saveEvent()">Save Event</button>
            <button type="button" onclick="clearForm()">Clear</button>

            </form>
            <hr>
        
        <h3>All Training Events</h3>

        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Event Title</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Location</th>
                    <th>Capacity</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    
    </main>
    <script>
    let events = [];

    function getStatus(date) {
        let today     = new Date();
        let eventDate = new Date(date);
        if (eventDate < today) {
            return 'Completed';
        } else {
            return 'Upcoming';
        }
    }
    function saveEvent() {
        let title    = document.getElementById('evTitle').value;
        let category = document.getElementById('evCategory').value;
        let date     = document.getElementById('evDate').value;
        let location = document.getElementById('evLocation').value;
        let capacity = document.getElementById('evCapacity').value; 
  
  
  
  
  
  
  
    }

    </script>
</body>
</html>
